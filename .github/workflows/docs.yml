name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: validate-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Mintlify CLI
        working-directory: docs
        run: npm ci

      - name: Check generated documentation outputs
        run: ./script/check-docs.sh

      - name: Validate Mintlify build
        working-directory: docs
        run: npm run validate

      - name: Check links
        working-directory: docs
        run: npm run broken-links

  deploy-legacy-redirects:
    name: deploy-legacy-redirects
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - name: Build redirect site
        run: |
          mkdir .site
          for page in index guide commands config-reference compatibility goodies goodness; do
            cp docs-redirect/index.html ".site/$page.html"
          done

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .site

      - name: Deploy redirects
        id: deploy
        uses: actions/deploy-pages@v4
