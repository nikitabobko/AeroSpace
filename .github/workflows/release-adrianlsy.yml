name: release-adrianlsy

on:
  push:
    tags:
      - 'v*-Beta.adrianlsy.*'

jobs:
  release:
    name: Build, release, and update tap
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - run: ./.github/gh-actions-runner-xcode-select.sh
      - run: brew install bash fish xcbeautify swiftly
      - run: swiftly init --skip-install --assume-yes --verbose && swiftly install

      - name: Derive build version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          build_version="${tag#v}"
          # Fork versions must match <upstream>-Beta.adrianlsy.<n>, mirroring
          # upstream's "-Beta" pre-release marker.
          if ! echo "$build_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-Beta\.adrianlsy\.[0-9]+$'; then
            echo "Invalid tag format: $tag (expected v<upstream>-Beta.adrianlsy.<n>, e.g. v0.20.0-Beta.adrianlsy.1)" >&2
            exit 1
          fi
          {
            echo "build_version=$build_version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Test
        run: ./test.sh

      - name: Build release
        run: |
          # "-" means "Sign to run locally" — no codesign identity on GH runners.
          ./build-release.sh \
            --codesign-identity - \
            --build-version "${{ steps.version.outputs.build_version }}"

      - name: Create GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated release. See commit log for changes." \
            ".release/AeroSpace-v${{ steps.version.outputs.build_version }}.zip"

      - name: Generate Homebrew cask
        run: |
          ./script/build-brew-cask.sh \
            --cask-name aerospace-adrianlsy \
            --zip-uri "https://github.com/AdrianLSY/AeroSpace/releases/download/${{ steps.version.outputs.tag }}/AeroSpace-v${{ steps.version.outputs.build_version }}.zip" \
            --build-version "${{ steps.version.outputs.build_version }}" \
            --homepage "https://github.com/AdrianLSY/AeroSpace"

      - name: Open tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          gh repo clone AdrianLSY/homebrew-tap /tmp/tap
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="release/${{ steps.version.outputs.tag }}"
          git checkout -b "$branch"
          mkdir -p Casks
          cp "$GITHUB_WORKSPACE/.release/aerospace-adrianlsy.rb" Casks/aerospace-adrianlsy.rb
          git add Casks/aerospace-adrianlsy.rb
          git commit -m "Update aerospace-adrianlsy to ${{ steps.version.outputs.build_version }}"
          git push origin "$branch"
          gh pr create \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --body "Automated cask update for ${{ steps.version.outputs.tag }}.

          Generated by [release-adrianlsy](https://github.com/AdrianLSY/AeroSpace/actions) workflow run \`${{ github.run_id }}\`."
