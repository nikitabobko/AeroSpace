name: New Issue
description: New Issue
body:
  - type: markdown
    attributes:
      value: |
        AeroShift is an unofficial fork of AeroSpace. Please use GitHub Discussions in this fork before opening issues: https://github.com/Boredphilosopher96/AeroSpace/discussions
  - type: checkboxes
    id: checkbox
    attributes:
      label: 'Sanity check'
      options:
        - label: |
            I will use Discussions in this fork for questions and triage first
          required: true
  - type: textarea
    id: body
    attributes:
      label: Body
      value: |
        THIS FORK USES DISCUSSIONS-FIRST TRIAGE. FORK-SPECIFIC ISSUES SHOULD NOT BE REPORTED TO UPSTREAM AEROSPACE.
    validations:
      required: true
